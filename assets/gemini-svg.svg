<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="100%" height="auto">
    <style>
        .brand-name {
            font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
            font-size: 40px;
            font-weight: 800;
            fill: #1E2229;
            letter-spacing: 0.04em;
            text-anchor: middle;
        }
        .brand-subtitle {
            font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
            font-size: 15px;
            font-weight: 500;
            fill: #B38F36;
            letter-spacing: 0.32em;
            text-anchor: middle;
            text-transform: uppercase;
        }
    </style>
    
    <!-- Context Canvas Layer -->
    <g transform="translate(0, 10)">
        <!-- Primary Brand Marker (Big Font Center) -->
        <text x="300" y="75" class="brand-name">MARKOV-FISHER</text>
        
        <!-- Subtitle Core (Smaller Font Directly Below) -->
        <!-- Offset adjusting for wide track letter-spacing alignment -->
        <text x="302" y="120" class="brand-subtitle">ADVISORY PARTNERS</text>
    </g>
</svg>
